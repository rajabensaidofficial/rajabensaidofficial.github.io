<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --black:      #0A0A0A;
  --black-soft: #141414;
  --black-card: #1A1712;
  --gold:       #C9A24B;
  --gold-bright:#E4C877;
  --off-white:  #EDEAE3;
  --grey-dim:   #8C877D;

  --display: 'Cormorant Garamond', 'Georgia', serif;
  --body:    'Jost', 'Segoe UI', sans-serif;
  --mono:    'Space Mono', monospace;

  --wrap: 900px;
}

*{ box-sizing: border-box; }
html{ scroll-behavior: smooth; }
body{
  margin:0;
  background: var(--black);
  color: var(--off-white);
  font-family: var(--body);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a{ color: inherit; text-decoration: none; }

.wrap{
  max-width: var(--wrap);
  margin: 0 auto;
  padding: 0 28px;
}

/* ============ HERO / NAME ============ */
.hero{
  position: relative;
  padding: 130px 0 90px;
  text-align:center;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201,162,75,0.10), transparent 60%);
}
.hero-title{
  font-family: var(--display);
  font-weight: 600;
  font-size: clamp(3rem, 9vw, 6rem);
  margin: 0;
  letter-spacing: 0.06em;
  background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 55%, #8a6d2f 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-rule{
  width: 90px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 30px auto 0;
}
.hero-subtitle{
  font-family: var(--body);
  font-weight: 300;
  font-size: 1rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--grey-dim);
  margin: 18px 0 0;
}

/* ============ SONGS ============ */
.songs{
  padding: 10px 0 110px;
}
.track-list{
  list-style:none;
  margin:0; padding:0;
}
.track{
  border-bottom: 1px solid rgba(201,162,75,0.18);
}
.track-row{
  display:flex;
  align-items:center;
  gap: 22px;
  padding: 24px 6px;
  cursor: pointer;
}
.track-num{
  font-family: var(--mono);
  color: var(--grey-dim);
  font-size: 0.85rem;
  width: 24px;
  flex-shrink:0;
}
.track-info{
  flex-grow:1;
}
.track-title{
  font-family: var(--display);
  font-weight: 600;
  font-size: 1.4rem;
  color: var(--off-white);
  letter-spacing: 0.01em;
  transition: color .2s ease;
}
.track-row:hover .track-title{ color: var(--gold-bright); }

.track-toggle{
  flex-shrink:0;
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background .2s ease, color .2s ease;
}
.track-row:hover .track-toggle,
.track-toggle[aria-expanded="true"]{
  background: var(--gold);
  color: var(--black);
}
.track-download{
  flex-shrink:0;
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(201,162,75,0.4);
  color: var(--grey-dim);
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background .2s ease, color .2s ease, border-color .2s ease;
}
.track-download:hover{
  background: var(--gold);
  color: var(--black);
  border-color: var(--gold);
}
.dl-icon{ width: 16px; height: 16px; }

.play-icon{ width: 14px; height: 14px; margin-left: 2px; }
.track-toggle[aria-expanded="true"] .icon-play{ display:none; }
.track-toggle[aria-expanded="false"] .icon-pause{ display:none; }

.track-player{
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.player-frame{
  position: relative;
  margin-bottom: 24px;
  padding: 3px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--gold-bright), var(--gold) 45%, #6b5424 100%);
  box-shadow: 0 0 24px rgba(201,162,75,0.16);
}
.player-frame::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius: 9px;
  background: radial-gradient(ellipse at 30% 0%, rgba(228,200,119,0.35), transparent 60%);
  pointer-events:none;
}
.track-player iframe{
  position: relative;
  width: 100%;
  height: 120px;
  border: none;
  border-radius: 6px;
  display: block;
  background: var(--black-card);
}
.track.is-open .track-player{
  max-height: 166px;
}

@media (max-width: 720px){
  .track-row{ gap: 14px; padding: 20px 4px; }
  .track-title{ font-size: 1.15rem; }
}

@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  *{ transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}

<script>
document.querySelectorAll('.track-row').forEach(row => {
  row.addEventListener('click', (e) => {
    if(e.target.closest('.track-download')) return;
    const track = row.closest('.track');
    const btn = row.querySelector('.track-toggle');
    const isOpen = track.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', isOpen);
  });
});
</script>
